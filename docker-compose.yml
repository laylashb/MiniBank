version: "3.9"

services:
  db:
    image: mysql:8
    container_name: minibank-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: minibank
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  web:
    image: php:8.2-apache
    container_name: minibank-web
    volumes:
      - ./php:/var/www/html
      - ./js:/var/www/html/js
      - ./css:/var/www/html/css
    ports:
      - "8080:80"
    depends_on:
      - db