<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniBank — Ajouter un client</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- ======= NAVIGATION ======= -->
  <nav>
    <a href="../index.html" class="nav-logo">Mini<span>Bank</span></a>
    <ul class="nav-links">
      <li><a href="../clients/index.html" class="active">Clients</a></li>
      <li><a href="../comptes/index.html">Comptes</a></li>
      <li><a href="../transactions/index.html">Transactions</a></li>
    </ul>
  </nav>

  <!-- ======= CONTENU PRINCIPAL ======= -->
  <main>

    <div class="page-header">
      <h1>Ajouter un <span>Client</span></h1>
      <!-- Bouton retour vers la liste des clients -->
      <a href="../clients/index.html" class="btn btn-secondary">← Retour</a>
    </div>

    <div class="card" style="max-width: 600px;">

      <!--
        FORMULAIRE D'AJOUT CLIENT
        ─────────────────────────────────────────
        - method="POST"        : envoie les données en POST (obligatoire pour PHP)
        - action="#"           : ta collègue PHP mettra ici le chemin vers son fichier,
                                 par exemple : action="../../php/clients/index.php"
        - data-validate="client" : le JS dans app.js vérifie les champs avant envoi
        ─────────────────────────────────────────
      -->
      <form method="POST" action="#" data-validate="client">

        <!-- Deux champs côte à côte : Nom et Prénom -->
        <div class="form-row">

          <div class="form-group">
            <label for="nom">Nom <span class="required">*</span></label>
            <input type="text" id="nom" name="nom" placeholder="Ex : Dupont">
            <!-- Ce span devient rouge si le champ est vide (géré par app.js) -->
            <span class="field-error"></span>
          </div>

          <div class="form-group">
            <label for="prenom">Prénom <span class="required">*</span></label>
            <input type="text" id="prenom" name="prenom" placeholder="Ex : Marie">
            <span class="field-error"></span>
          </div>

        </div>

        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="Ex : marie@mail.com">
          <span class="field-error"></span>
        </div>

        <div class="form-group">
          <label for="ville">Ville</label>
          <!-- La ville n'est pas obligatoire, donc pas de * ni de field-error -->
          <input type="text" id="ville" name="ville" placeholder="Ex : Paris">
        </div>

        <!-- Boutons en bas à droite -->
        <div class="form-actions">
          <a href="../clients/index.html" class="btn btn-secondary">Annuler</a>
          <button type="submit" class="btn btn-primary">✓ Enregistrer</button>
        </div>

      </form>

    </div>

  </main>

  <!-- ======= FOOTER ======= -->
  <footer>
    MiniBank &copy; 2026 — Projet scolaire
  </footer>

  <!--
    La modale est présente sur toutes les pages même si on ne supprime
    pas depuis ici — ça évite une erreur JavaScript dans app.js
  -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <h2>⚠ Confirmer la suppression</h2>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="btn-cancel-delete" class="btn btn-secondary">Annuler</button>
        <button id="btn-confirm-delete" class="btn btn-danger">Oui, supprimer</button>
      </div>
    </div>
  </div>

  <!-- On remonte d'un dossier avec ../ pour atteindre app.js dans front_end/ -->
  <script src="../app.js"></script>

</body>
</html>
