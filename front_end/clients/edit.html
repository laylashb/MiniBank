<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniBank — Modifier un client</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- ======= NAVIGATION ======= -->
  <nav>
    <a href="../index.html" class="nav-logo">Mini<span>Bank</span></a>
    <ul class="nav-links">
      <li><a href="../clients/index.html" class="active">Clients</a></li>
      <li><a href="../comptes/index.html">Comptes</a></li>
      <li><a href="../transactions/index.html">Transactions</a></li>
    </ul>
  </nav>

  <!-- ======= CONTENU PRINCIPAL ======= -->
  <main>

    <div class="page-header">
      <h1>Modifier un <span>Client</span></h1>
      <!-- Bouton retour vers la liste des clients -->
      <a href="../clients/index.html" class="btn btn-secondary">← Retour</a>
    </div>

    <div class="card" style="max-width: 600px;">

      <!--
        FORMULAIRE DE MODIFICATION CLIENT
        ─────────────────────────────────────────
        La différence avec add.html c'est que les champs sont
        déjà pré-remplis avec les infos du client à modifier.

        - method="POST"          : envoie les données en POST
        - action="#"             : ta collègue PHP mettra le chemin vers son fichier,
                                   par exemple : action="../../php/clients/update.php"
        - data-validate="client" : le JS vérifie les champs avant envoi
        ─────────────────────────────────────────
      -->
      <form method="POST" action="#" data-validate="client">

        <!--
          CHAMP CACHÉ — très important !
          Il envoie l'ID du client au PHP pour qu'il sache
          quel client modifier dans la base de données.
          Ta collègue PHP mettra : value="<?= $client['id'] ?>"
        -->
        <input type="hidden" name="id" value="1">

        <!-- Deux champs côte à côte : Nom et Prénom -->
        <div class="form-row">

          <div class="form-group">
            <label for="nom">Nom <span class="required">*</span></label>
            <!--
              Le champ est pré-rempli avec la valeur actuelle du client.
              Ta collègue PHP remplacera "Dupont" par :
              value="<?= htmlspecialchars($client['nom']) ?>"
            -->
            <input type="text" id="nom" name="nom" value="Dupont">
            <span class="field-error"></span>
          </div>

          <div class="form-group">
            <label for="prenom">Prénom <span class="required">*</span></label>
            <!--
              Ta collègue PHP remplacera "Marie" par :
              value="<?= htmlspecialchars($client['prenom']) ?>"
            -->
            <input type="text" id="prenom" name="prenom" value="Marie">
            <span class="field-error"></span>
          </div>

        </div>

        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <!--
            Ta collègue PHP remplacera la valeur par :
            value="<?= htmlspecialchars($client['email']) ?>"
          -->
          <input type="email" id="email" name="email" value="marie.dupont@mail.com">
          <span class="field-error"></span>
        </div>

        <div class="form-group">
          <label for="ville">Ville</label>
          <!--
            Ta collègue PHP remplacera la valeur par :
            value="<?= htmlspecialchars($client['ville']) ?>"
          -->
          <input type="text" id="ville" name="ville" value="Paris">
        </div>

        <!-- Boutons en bas à droite -->
        <div class="form-actions">
          <a href="../clients/index.html" class="btn btn-secondary">Annuler</a>
          <button type="submit" class="btn btn-primary">✓ Enregistrer les modifications</button>
        </div>

      </form>

    </div>

  </main>

  <!-- ======= FOOTER ======= -->
  <footer>
    MiniBank &copy; 2026 — Projet scolaire
  </footer>

  <!-- Modale présente sur toutes les pages -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <h2>⚠ Confirmer la suppression</h2>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="btn-cancel-delete" class="btn btn-secondary">Annuler</button>
        <button id="btn-confirm-delete" class="btn btn-danger">Oui, supprimer</button>
      </div>
    </div>
  </div>

  <!-- On remonte d'un dossier avec ../ pour atteindre app.js dans front_end/ -->
  <script src="../app.js"></script>

</body>
</html>
